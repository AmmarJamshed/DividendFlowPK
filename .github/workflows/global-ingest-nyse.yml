name: Ingest NYSE (full universe)

on:
  workflow_dispatch:
    inputs:
      shard_count:
        description: Parallel shards (default 8)
        default: "8"
  schedule:
    # US close 16:00 ET → 22:00 UTC → 03:00 PKT next day (Mon–Fri)
    - cron: "0 22 * * 1-5"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ingestion/requirements.txt
      - name: Ingest NYSE shard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHARD: ${{ matrix.shard }}
          SHARD_COUNT: ${{ github.event.inputs.shard_count || '8' }}
        run: python ingestion/jobs/daily_close.py NYSE
