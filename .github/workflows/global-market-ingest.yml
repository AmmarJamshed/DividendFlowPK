# Legacy manual ingest for TADAWUL / TSE / SSE (curated lists).
# NYSE, NASDAQ, HKEX, LSE → use global-ingest-*.yml (full universe + market-close crons).

name: Global Market Ingest (Asia-GCC manual)

on:
  workflow_dispatch:
    inputs:
      exchanges:
        description: "TADAWUL,TSE,SSE or any single exchange"
        default: "TADAWUL,TSE,SSE"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ingestion/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          IFS=',' read -ra ARR <<< "${{ github.event.inputs.exchanges }}"
          python ingestion/jobs/daily_close.py "${ARR[@]}"
