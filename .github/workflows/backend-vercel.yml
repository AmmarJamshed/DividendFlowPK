# SITE_CLOSED — entire workflow gated. Delete this comment and any `if: false  # SITE_CLOSED` lines to restore.
name: Backend Vercel Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "data/**"
      - "api/**"
      - "vercel.json"
      - ".github/workflows/backend-vercel.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: false  # SITE_CLOSED
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check required Vercel secrets
        id: vercel-secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Vercel deploy â€” set repository secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (Vercel â†’ Project â†’ Settings â†’ General)."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.vercel-secrets.outputs.ready == 'true'

      - name: Set up Node
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        if: steps.vercel-secrets.outputs.ready == 'true'
        working-directory: backend
        run: npm ci

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: steps.vercel-secrets.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build backend project on Vercel
        if: steps.vercel-secrets.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        if: steps.vercel-secrets.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
