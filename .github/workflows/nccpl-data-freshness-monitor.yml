name: NCCPL Data Freshness Monitor

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check NCCPL CSV freshness and notify
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const csvPath = path.join(process.env.GITHUB_WORKSPACE, "data", "risk", "nccpl_risk_metrics.csv");
            const alertTitle = "[Alert] NCCPL risk data is stale";
            const maxAgeDays = 4;

            function parseCsvLine(line) {
              const out = [];
              let cur = "";
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                  if (inQuotes && line[i + 1] === '"') {
                    cur += '"';
                    i++;
                  } else {
                    inQuotes = !inQuotes;
                  }
                } else if (ch === "," && !inQuotes) {
                  out.push(cur);
                  cur = "";
                } else {
                  cur += ch;
                }
              }
              out.push(cur);
              return out.map(v => v.trim());
            }

            function findMaxLastUpdated(csvText) {
              const lines = csvText.split(/\r?\n/).filter(Boolean);
              if (lines.length < 2) return null;
              const headers = parseCsvLine(lines[0]);
              const idx = headers.findIndex(h => h.toLowerCase() === "last_updated");
              if (idx === -1) return null;

              let maxDate = null;
              for (let i = 1; i < lines.length; i++) {
                const cols = parseCsvLine(lines[i]);
                const raw = (cols[idx] || "").trim();
                if (!raw) continue;
                // Stored format is like "2026-03-21 00:24:25"; convert to ISO-ish.
                const d = new Date(raw.replace(" ", "T") + "Z");
                if (Number.isNaN(d.getTime())) continue;
                if (!maxDate || d > maxDate) maxDate = d;
              }
              return maxDate;
            }

            async function findAlertIssue() {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: "open",
                per_page: 100
              });
              return issues.find(i => i.title === alertTitle) || null;
            }

            if (!fs.existsSync(csvPath)) {
              core.setFailed(`Missing file: ${csvPath}`);
              return;
            }

            const raw = fs.readFileSync(csvPath, "utf8");
            const maxLastUpdated = findMaxLastUpdated(raw);
            if (!maxLastUpdated) {
              core.setFailed("Could not parse last_updated from NCCPL CSV.");
              return;
            }

            const now = new Date();
            const ageMs = now.getTime() - maxLastUpdated.getTime();
            const ageDays = ageMs / (1000 * 60 * 60 * 24);

            const existing = await findAlertIssue();
            if (ageDays > maxAgeDays) {
              const body = [
                "NCCPL risk data appears stale.",
                "",
                `- Latest \`last_updated\`: ${maxLastUpdated.toISOString()}`,
                `- Age (days): ${ageDays.toFixed(2)}`,
                `- Allowed max age (days): ${maxAgeDays}`,
                "",
                "Check Render cron `dividendflow-nccpl-scraper` and Browserless/GitHub token settings."
              ].join("\n");

              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body
                });
                core.info(`Updated existing alert issue #${existing.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: alertTitle,
                  body
                });
                core.info(`Created alert issue #${created.data.number}`);
              }
              return;
            }

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Recovery detected. NCCPL data is fresh again (latest: ${maxLastUpdated.toISOString()}, age: ${ageDays.toFixed(2)} days).`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed"
              });
            }

            core.info(`NCCPL data is fresh (age ${ageDays.toFixed(2)} days).`);
