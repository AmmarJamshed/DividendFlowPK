# Market Closing Prices scraper - runs psx.py daily after PSX market close
# Schedule: 12:00 UTC (5pm PKT) Mon–Fri only — PSX closed weekends
# Outputs: psx_full_dataset.csv, daily_prices.csv, price_changes.csv → pushed to GitHub

name: PSX Market Closing Prices

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    concurrency:
      group: psx-market-prices-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run PSX scraper
        env:
          CI: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCRAPER_EMAIL_TO: ${{ secrets.SCRAPER_EMAIL_TO }}
        run: python psx.py
