name: Supabase CSV Sync

on:
  workflow_dispatch:
  schedule:
    # Weekdays 12:30 UTC â€” after PSX price scraper (12:00 UTC)
    - cron: '30 12 * * 1-5'

jobs:
  sync:
    if: false  # SITE_CLOSED
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: ETL CSV â†’ Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/etl-csv-to-supabase.cjs

      - name: Verify scrape freshness
        run: node scripts/verify-scrape-freshness.cjs
