name: NCCPL Risk Scraper

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: nccpl-risk-scraper-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-scraper.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scraper.txt

      - name: Run NCCPL scraper
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
          NCCPL_UNBLOCK_ATTEMPTS_PER_HOST: "1"
          NCCPL_UNBLOCK_RETRY_PAUSE: "15"
        with:
          timeout_minutes: 55
          max_attempts: 2
          retry_wait_seconds: 120
          command: python scripts/scrape-nccpl-browserless.py
