name: Ingest LSE (full universe)

on:
  workflow_dispatch:
    inputs:
      shard_count:
        description: Parallel shards (default 6)
        default: "6"
  schedule:
    # London close 16:30 → 17:00 UTC → 22:00 PKT (Mon–Fri)
    - cron: "0 17 * * 1-5"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ingestion/requirements.txt
      - name: Ingest LSE shard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHARD: ${{ matrix.shard }}
          SHARD_COUNT: ${{ github.event.inputs.shard_count || '6' }}
        run: python ingestion/jobs/daily_close.py LSE
