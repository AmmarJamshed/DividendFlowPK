# Manual smoke test for the four suspended Render crons (same steps + retries as scheduled workflows).
# GitHub: Actions → "Verify all Render cron replacements" → Run workflow
# After pushing workflow changes, run this once to confirm secrets and upstream APIs work.

name: Verify all Render cron replacements

on:
  workflow_dispatch:

concurrency:
  group: verify-render-crons-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dividendflow-scraper:
    name: dividendflow-scraper
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json
      - name: Install dependencies
        working-directory: scripts
        run: npm install
      - name: Run scraper pipeline
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCRAPER_EMAIL_TO: ${{ secrets.SCRAPER_EMAIL_TO }}
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 45
          command: cd scripts && node run-all.js

  dividendflow-news:
    name: dividendflow-news
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json
      - name: Install dependencies
        working-directory: scripts
        run: npm install
      - name: Run news pipeline
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCRAPER_EMAIL_TO: ${{ secrets.SCRAPER_EMAIL_TO }}
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 45
          command: cd scripts && node run-news.js

  dividendflow-health-check:
    name: dividendflow-health-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json
      - name: Install dependencies
        working-directory: scripts
        run: npm install
      - name: Ping backend health
        uses: nick-fields/retry@v3
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        with:
          timeout_minutes: 5
          max_attempts: 4
          retry_wait_seconds: 20
          command: cd scripts && node health-check.js

  dividendflow-nccpl-scraper:
    name: dividendflow-nccpl-scraper
    runs-on: ubuntu-latest
    timeout-minutes: 130
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-scraper.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scraper.txt
      - name: Run NCCPL scraper
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
          NCCPL_UNBLOCK_ATTEMPTS_PER_HOST: "2"
          NCCPL_UNBLOCK_RETRY_PAUSE: "25"
        with:
          timeout_minutes: 70
          max_attempts: 2
          retry_wait_seconds: 120
          command: python scripts/scrape-nccpl-browserless.py
