# DividendFlow PK - Render Blueprint
# Deploy both backend and frontend from GitHub

services:
  # Cron: Scrape PSX payout data, update dividend CSVs, push to GitHub
  - type: cron
    runtime: node
    name: dividendflow-scraper
    schedule: "0 11 * * *"
    rootDir: .
    buildCommand: cd scripts && npm install
    startCommand: cd scripts && node run-all.js
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: AmmarJamshed/DividendFlowPK
      - key: SCRAPER_EMAIL_TO
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # Cron: Health check - ping backend every 6 hours
  - type: cron
    runtime: node
    name: dividendflow-health-check
    schedule: "0 */6 * * *"
    rootDir: .
    buildCommand: cd scripts && npm install
    startCommand: cd scripts && node health-check.js
    envVars:
      - key: BACKEND_URL
        value: https://dividendflow-backend.onrender.com

  # Backend API (Node.js + Express)
  - type: web
    runtime: node
    name: dividendflow-backend
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend (React Static Site)
  - type: web
    runtime: static
    name: dividendflow-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
