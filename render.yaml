# DividendFlow PK - Render Blueprint
# Deploy both backend and frontend from GitHub

services:
  # Backend API (Node.js + Express)
  - type: web
    runtime: node
    name: dividendflow-backend
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://dbkytlsejpxmclpznudk.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: CONTACT_EMAIL_TO
        value: ammarjamshed123@gmail.com
      - key: CONTACT_EMAIL_FROM
        value: DividendFlow PK <contact@dividendflow.pk>
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # Frontend (React Static Site)
  - type: web
    runtime: static
    name: dividendflow-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    headers:
      - path: /ads.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /ads.txt
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /sw.js
        name: Content-Type
        value: application/javascript; charset=utf-8
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /manifest.json
        name: Content-Type
        value: application/manifest+json
    routes:
      - type: rewrite
        source: /ads.txt
        destination: /ads.txt
      - type: rewrite
        source: /robots.txt
        destination: /robots.txt
      - type: rewrite
        source: /sitemap.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /sw.js
        destination: /sw.js
      - type: rewrite
        source: /manifest.json
        destination: /manifest.json
      - type: redirect
        source: /ads.txt/
        destination: /ads.txt
        status: 301
      - type: redirect
        source: /robots.txt/
        destination: /robots.txt
        status: 301
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://dividendflow-backend.onrender.com/api
      - key: REACT_APP_SUPABASE_URL
        value: https://dbkytlsejpxmclpznudk.supabase.co
